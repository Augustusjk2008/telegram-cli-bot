
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerShell Web Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0c0c0c;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .header {
            background: #1e1e1e;
            color: #cccccc;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .header h1 {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
        }
        .status {
            margin-left: auto;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 3px;
            background: #333;
        }
        .status.connecting { color: #f9f1a5; }
        .status.connected { color: #16c60c; background: #0d3b0d; }
        .status.disconnected { color: #e74856; }
        #terminal-container {
            flex: 1;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ PowerShell Web Terminal</h1>
        <span class="status connecting" id="status">连接中...</span>
    </div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        // 初始化 xterm.js
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: '"Cascadia Code", "Courier New", "Consolas", monospace',
            theme: {
                background: '#0c0c0c',
                foreground: '#cccccc',
                cursor: '#ffffff',
                black: '#0c0c0c',
                red: '#c50f1f',
                green: '#13a10e',
                yellow: '#c19c00',
                blue: '#0037da',
                magenta: '#881798',
                cyan: '#3a96dd',
                white: '#cccccc',
                brightBlack: '#767676',
                brightRed: '#e74856',
                brightGreen: '#16c60c',
                brightYellow: '#f9f1a5',
                brightBlue: '#3b78ff',
                brightMagenta: '#b4009e',
                brightCyan: '#61d6d6',
                brightWhite: '#f2f2f2'
            }
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        let ws = null;
        const statusEl = document.getElementById('status');

        // 自动连接到 WebSocket 服务器
        function connect() {
            statusEl.textContent = '连接中...';
            statusEl.className = 'status connecting';

            // 连接到 WebSocket 服务器（端口 8081）
            ws = new WebSocket('ws://127.0.0.1:8081');

            ws.onopen = () => {
                statusEl.textContent = '已连接';
                statusEl.className = 'status connected';
                // 发送初始化消息，使用默认 shell
                ws.send(JSON.stringify({ type: 'init', shell: 'powershell' }));
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    event.data.arrayBuffer().then(buffer => {
                        const bytes = new Uint8Array(buffer);
                        term.write(bytes);
                    });
                } else if (typeof event.data === 'string') {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.error) {
                            term.writeln(`[31m错误: ${msg.error}[0m`);
                        }
                    } catch {
                        term.write(event.data);
                    }
                }
            };

            ws.onerror = (error) => {
                term.writeln(`[31m连接错误，请刷新页面重试[0m`);
                statusEl.textContent = '连接失败';
                statusEl.className = 'status disconnected';
            };

            ws.onclose = () => {
                statusEl.textContent = '已断开';
                statusEl.className = 'status disconnected';
                ws = null;
            };
        }

        // 监听终端输入并发送到 WebSocket
        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        // 页面加载后自动连接
        window.addEventListener('load', () => {
            setTimeout(connect, 500);
        });
    </script>
</body>
</html>
